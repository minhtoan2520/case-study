<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
</head>
<body>
    <form action="" id="login">
        <h1>Đăng nhập</h1>
        <p>Tên tài khoản</p>
        <input type="text" name="username" id="username">
        <br>
        <p>Mật khẩu</p>
        <input type="password" name="password" id="Password">
        <br>
        <label>
            <input type="checkbox">Nhớ tài khoản</label>
            <a onmouseover="this.style.color='red'" onmouseout="this.style.color=''" href="resetpass.html" >Quên mật khẩu?</a>
        <br>
        <button type="button" onclick="login()">Đăng nhập</button>
        <br>
        <a>Bạn chưa có tài khoản?</a>
        <a onmouseover="this.style.color='red'" onmouseout="this.style.color=''" href="register.html">Đăng ký</a>
    </form>
</body>
</html>
